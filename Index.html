<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ParkSmart Haridwar</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">
<meta name="theme-color" content="#0A1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
body { margin:0; font-family:sans-serif; background:#0A1628; color:white; text-align:center; }
.card { background:white; color:black; margin:12px; padding:14px; border-radius:12px; }
button { padding:10px 20px; border:none; border-radius:8px; background:#FF6B00; color:white; }
</style>
</head>

<body>

<h2>ParkSmart Haridwar 🚗</h2>
<p>Smart Haridwar Challenge 2026</p>

<div id="zones"></div>

<script>
// ── CONFIG ──
const DEFAULT_API_KEY = "AIzaSyBbbOqX1omXUIHsz5VGzvJrCTaJUMub98E";

// ── DATA ──
let zones = [
  {name:"Singhdwar", available:143, total:500, price:30, lat:29.9457, lng:78.1642},
  {name:"Jwalapur", available:57, total:300, price:20, lat:29.9102, lng:78.1390},
  {name:"Har ki Pauri", available:312, total:800, price:40, lat:29.9580, lng:78.1625}
];

// ── RENDER ──
function render() {
  const el = document.getElementById("zones");
  el.innerHTML = "";

  zones.forEach(z => {
    const pct = Math.round(z.available/z.total*100);
    const rate = Math.random()*2+1;
    const time = Math.floor(z.available/rate);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${z.name}</b><br>
      ${z.available} spots free<br>
      ₹${z.price}/hr<br>
      ⏳ ~${time} min left<br><br>
      <button onclick="book('${z.name}')">Book</button>
      <button onclick="nav(${z.lat},${z.lng})">Navigate</button>
    `;

    el.appendChild(div);
  });
}

// ── AI SUGGESTION ──
function getBestZone() {
  return zones
    .filter(z => z.available > 0)
    .sort((a,b)=>{
      const sA = (a.available/a.total)*0.6 - a.price*0.2;
      const sB = (b.available/b.total)*0.6 - b.price*0.2;
      return sB - sA;
    })[0];
}

console.log("ParkSmart Haridwar - Smart City Prototype");

// ── BOOK ──
function book(name) {
  const z = zones.find(x=>x.name===name);

  const booking = {
    id:"PKS"+Math.floor(Math.random()*999999),
    zone:name,
    time:Date.now()
  };

  localStorage.setItem("booking", JSON.stringify(booking));
  alert("Booked at " + name);
}

// ── NAVIGATION ──
function nav(lat,lng){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
}

// ── LOAD MAP AUTO ──
function loadMap(){
  const script = document.createElement("script");
  script.src = `https://maps.googleapis.com/maps/api/js?key=${DEFAULT_API_KEY}`;
  document.head.appendChild(script);
}

// ── INIT ──
render();
loadMap();

const best = getBestZone();
console.log("AI recommends:", best.name);

</script>

</body>
</html>
